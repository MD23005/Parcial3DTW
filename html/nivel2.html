<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System BREAK 4077 - nivel 2</title>
    <link rel="stylesheet" href="../css/nivel2.css">
</head>
<body>
    <div class="broken-screen" id="pantalla">
        <div class="glitch-overlay">
            <div class="title-container">
                <h1>Nivel 2</h1>
                <h2>El cartógrafo perdido</h2>
            </div>

            <!--Contenedor del cartógrafo-->
            <div class="map-container">
                <div class="bubble" id="speech-bubble">Para continuar es necesario tener un mapa, por suerte te encuentras a un cartógrafo que ya ha dibujado uno, compártele tu ubicación para poder marcarla en el mapa</div>
                
                <button id="marcar-btn">Ver mapa</button>
                <div class="mapa">
                    <canvas id="mapaCanvas" width="550" height="400"></canvas>
                </div>

                <button class="btn-hidden pointer-map" id="pointer-map">Marca tu ubicación</button>

            </div>
            <button class="continuar-btn btn-hidden" id="btn-continuar">Continuar al siguiente nivel</button>
        </div>
    </div>
    <script src="../js/nivel2.js"></script>
</body>
</html>
